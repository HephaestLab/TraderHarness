const CELL = 64;
const COLS = 6;
const ROWS = 4;
const SCALE = 3;

const rowLabels = ['Walk Down (4f) + Idle (2f)', 'Walk Up (4f) + Idle (2f)', 'Walk Left (4f) + Idle (2f)', 'Actions: sit/celebrate/etc'];

img.onload = () => {
  // Create one animated canvas per row
  for (let row = 0; row < ROWS; row++) {
    const box = document.createElement('div');
    box.className = 'anim-box';

    const label = document.createElement('label');
    label.textContent = 'Row ' + row + ': ' + rowLabels[row];
    box.appendChild(label);

    const canvas = document.createElement('canvas');
    canvas.width = CELL * SCALE;
    canvas.height = CELL * SCALE;
    box.appendChild(canvas);
    document.body.appendChild(box);

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let frame = 0;
    setInterval(() => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const sx = (frame % COLS) * CELL;
      const sy = row * CELL;
      ctx.drawImage(img, sx, sy, CELL, CELL, 0, 0, CELL * SCALE, CELL * SCALE);
      frame++;
    }, 180);
  }

  // Also show full spritesheet
  const box2 = document.createElement('div');
  box2.className = 'anim-box';
  const label2 = document.createElement('label');
  label2.textContent = 'Full Spritesheet (' + COLS + 'x' + ROWS + ' @ ' + CELL + 'px)';
  box2.appendChild(label2);
  const c2 = document.createElement('canvas');
  c2.width = COLS * CELL * 2;
  c2.height = ROWS * CELL * 2;
  const ctx2 = c2.getContext('2d');
  ctx2.imageSmoothingEnabled = false;
  ctx2.drawImage(img, 0, 0, c2.width, c2.height);
  box2.appendChild(c2);
  document.body.appendChild(box2);
};
</script>
