site_name: TraderHarness
site_description: 抗数据污染的 LLM 交易 Agent 回测环境与轨迹数据合成器
site_url: https://hephaestlab.github.io/TraderHarness/
repo_url: https://github.com/HephaestLab/TraderHarness
repo_name: HephaestLab/TraderHarness
edit_uri: edit/main/docs/
copyright: Apache-2.0 © HephaestLab

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: black
      accent: green

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - 概览: index.md
  - 快速上手: quickstart.md
  - 防数据泄漏: contamination.md
  - 核心架构: architecture.md
  - 项目对比: comparison.md
  - 多角色委员会: design/multi-role-agent.md
  - 训练数据与轨迹导出: training-data.md
  - 数据与许可: data.md
  - CLI 与本地 API: api.md
  - 扩展开发: extensions.md
  - 路线图: roadmap.md
  - 常见问题: faq.md
  - 发布分发手册: release-playbook.md
