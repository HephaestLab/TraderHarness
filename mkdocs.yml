site_name: TraderHarness
site_description: Contamination-resistant market environment for autonomous trading agents
site_url: https://hephaestlab.github.io/TraderHarness/
repo_url: https://github.com/HephaestLab/TraderHarness
repo_name: HephaestLab/TraderHarness
edit_uri: edit/main/docs/
copyright: Apache-2.0 © HephaestLab

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: black
      accent: green

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Preventing data leakage: contamination.md
  - Core architecture: architecture.md
  - Project comparison: comparison.md
  - Multi-role committees: design/multi-role-agent.md
  - Training data: training-data.md
  - Data and licensing: data.md
  - CLI and local API: api.md
  - Extending TraderHarness: extensions.md
  - Roadmap: roadmap.md
  - FAQ: faq.md
  - Release distribution: release-playbook.md
